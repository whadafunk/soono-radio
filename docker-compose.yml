version: '3.8'

services:
  icecast:
    image: infiniteproject/icecast:latest
    container_name: radio-icecast
    ports:
      - "8000:8000"
    volumes:
      - ./icecast/icecast.xml:/etc/icecast.xml
      - icecast-logs:/var/log/icecast
    environment:
      - TZ=UTC
    networks:
      - radio-network

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: radio-api
    ports:
      - "3000:3000"
    depends_on:
      - icecast
    environment:
      - NODE_ENV=development
    volumes:
      - ./icecast/icecast.xml:/etc/icecast.xml
    networks:
      - radio-network

  web:
    build:
      context: apps/web
      dockerfile: Dockerfile
    container_name: radio-web
    ports:
      - "5173:5173"
    depends_on:
      - api
    networks:
      - radio-network

volumes:
  icecast-logs:

networks:
  radio-network:
    driver: bridge
