name: soono

# ── Services ──────────────────────────────────────────────────────────────────
#
# Startup order enforced by depends_on:
#   icecast       — no dependencies, starts immediately
#   socket-proxy  — no dependencies, starts immediately
#   api           — no dependencies, starts immediately; healthcheck passes once
#                   HTTP is up and the LiquidSoap script has been generated
#   web           — no dependencies (nginx serves static files independently)
#   liquidsoap    — waits for api: service_healthy so the generated
#                   mix-engine.liq exists before LS tries to load it
#
# Container restarts (Restart Icecast / Restart LiquidSoap buttons) go through
# the socket-proxy service which exposes only POST /containers/*/restart on the
# internal network. The Docker socket is never mounted into app containers.

services:

  # ── Docker socket proxy ──────────────────────────────────────────────────────
  # Exposes a narrow slice of the Docker Engine API on the internal network.
  # Only POST /containers/*/restart is permitted — no socket mount in app containers.
  socket-proxy:
    image: tecnativa/docker-socket-proxy
    container_name: soono-socket-proxy
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      CONTAINERS: 1   # allow /containers/* endpoints
      POST: 1         # allow POST (needed for restart)
      # All other resource types (images, networks, volumes, etc.) default to 0.
    networks:
      - soono-net

  # ── Icecast ─────────────────────────────────────────────────────────────────
  icecast:
    build:
      context: icecast
    container_name: soono-icecast
    restart: unless-stopped
    ports:
      - "8000:8000"   # SSL (configured in icecast.xml)
      - "8001:8001"   # Plain HTTP — LiquidSoap pushes audio here
    volumes:
      - ./icecast/icecast.xml:/etc/icecast2/icecast.xml:ro
      - ./icecast/logs:/usr/local/icecast/logs
      - ./data/certs:/etc/icecast2/certs:ro
    networks:
      - soono-net

  # ── API + Supervisor ─────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: soono-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      ICECAST_URL: ${ICECAST_URL}
      ICECAST_ADMIN_USER: ${ICECAST_ADMIN_USER}
      ICECAST_ADMIN_PASS: ${ICECAST_ADMIN_PASS}
      LS_HARBOR_URL: ${LS_HARBOR_URL}
      LS_API_URL: ${LS_API_URL}
      LS_MEDIA_DIR: ${LS_MEDIA_DIR}
      CORS_ORIGINS: ${CORS_ORIGINS}
      DOCKER_PROXY_URL: ${DOCKER_PROXY_URL}
      LS_HARBOR_SECRET: ${LS_HARBOR_SECRET}
      ACOUSTID_API_KEY: ${ACOUSTID_API_KEY}
    volumes:
      # Persistent data: SQLite DB, incoming ingest queue, config JSON files
      - ./data:/data
      # Audio library — shared read-write with ingest; read-only in liquidsoap
      - ./media:/media
      # Structured log files (api.log, supervisor.log)
      - ./logs:/app/logs
      # LiquidSoap config (supervisor.json) and generated script (mix-engine.liq).
      # The API writes here; the liquidsoap service reads it (see below).
      - ./liquidsoap:/liquidsoap
      # Icecast config — API reads source-password and rewrites icecast.xml on settings save.
      - ./icecast:/icecast
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s
    networks:
      - soono-net

  # ── Web (React SPA served by nginx) ─────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: soono-web
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - soono-net

  # ── LiquidSoap ───────────────────────────────────────────────────────────────
  liquidsoap:
    build:
      context: liquidsoap
    container_name: soono-liquidsoap
    restart: unless-stopped
    ports:
      - "8005:8005"              # Harbor HTTP (track push, skip, queue, live-status)
      - "127.0.0.1:1234:1234"   # Telnet control (loopback only)
    volumes:
      # Generated script — same host directory the API writes to, mounted read-only.
      # The api healthcheck guarantees mix-engine.liq exists before LS starts.
      - ./liquidsoap:/etc/liquidsoap:ro
      # Audio library — read-only; paths embedded in annotated URIs by the supervisor
      - ./media:/media:ro
      - ./data/certs:/etc/liquidsoap/certs:ro
      - ./logs/liquidsoap:/var/log/liquidsoap
    depends_on:
      api:
        condition: service_healthy   # ensures mix-engine.liq is generated
      icecast:
        condition: service_started
    networks:
      - soono-net

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  soono-net:
    driver: bridge
