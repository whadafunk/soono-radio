server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls — strip the /api prefix before forwarding to the API container.
    location /api/ {
        proxy_pass http://api:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Match the 500 MB upload limit configured in the API.
        client_max_body_size 500m;
        proxy_read_timeout 120s;
    }

    # SPA fallback — unknown paths serve index.html so React Router handles routing.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
