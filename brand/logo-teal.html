<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #09090b;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 48px;
    min-height: 100vh;
    padding: 64px 0;
    font-family: Inter, sans-serif;
  }
  .label { color: #3f3f46; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; }
  .row { display: flex; flex-direction: column; align-items: flex-start; gap: 12px; }
</style>
</head>
<body>

<!-- A: 25% toward emerald — #37c2e0 -->
<div class="row">
<svg width="480" height="136" viewBox="0 0 240 68" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g1" x1="34" y1="60" x2="45.8" y2="10.8" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#37c2e0" stop-opacity="0"/>
      <stop offset="100%" stop-color="#37c2e0" stop-opacity="0.88"/>
    </linearGradient>
  </defs>
  <path d="M 34,60 A 26,26 0 1,1 45.8,10.8" stroke="url(#g1)" stroke-width="3.6" stroke-linecap="butt" fill="none"/>
  <path d="M 38.85,27.1 A 8.45,8.45 0 0,1 38.85,40.9"     stroke="#37c2e0" stroke-width="1.6" stroke-linecap="round"/>
  <path d="M 43.7,20.2  A 16.9,16.9 0 0,1 43.7,47.8"      stroke="#37c2e0" stroke-width="1.3" stroke-linecap="round" opacity="0.65"/>
  <path d="M 48.55,13.2 A 25.35,25.35 0 0,1 48.55,54.8"   stroke="#37c2e0" stroke-width="1.0" stroke-linecap="round" opacity="0.4"/>
  <line x1="34" y1="34" x2="22.7" y2="27.5" stroke="#37c2e0" stroke-width="2.6" stroke-linecap="round"/>
  <line x1="34" y1="34" x2="34"   y2="13.2" stroke="#37c2e0" stroke-width="1.4" stroke-linecap="round"/>
  <circle cx="34" cy="34" r="2.6" stroke="#37c2e0" stroke-width="1.3" fill="#09090b"/>
  <circle cx="34" cy="34" r="1"   fill="#37c2e0"/>
  <text x="74" y="48" font-family="Inter, sans-serif" font-weight="500" font-size="40" letter-spacing="-1.2" fill="#37c2e0">Soono</text>
</svg>
<div class="label">Sky-leaning teal — #37c2e0</div>
</div>

</body>
</html>
